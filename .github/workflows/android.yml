name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android Project Structure
      run: |
        # إنشاء المجلدات الأساسية إذا لم تكن موجودة
        mkdir -p app/src/main/java/com/example/fleetproductivity
        mkdir -p app/src/main/res/layout
        
        # إنشاء ملف settings.gradle
        echo "include ':app'" > settings.gradle
        
        # إنشاء ملف build.gradle الرئيسي
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        
        # إنشاء ملف build.gradle الخاص بتطبيق app
        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.fleetproductivity'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.fleetproductivity"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # إذا لم يكن ملف الـ Manifest موجوداً في مساره الصحيح، فسيقوم السيرفر بإنشائه تلقائياً هنا لتجنب الفشل
        if [ ! -f app/src/main/AndroidManifest.xml ]; then
          mkdir -p app/src/main
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Fleet Productivity"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity
                      android:name="com.example.fleetproductivity.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.action.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
        fi

        # إذا لم يكن ملف الـ MainActivity موجوداً في مساره الصحيح، فسيقوم السيرفر بإنشائه تلقائياً هنا
        if [ ! -f app/src/main/java/com/example/fleetproductivity/MainActivity.java ]; then
          cat <<EOF > app/src/main/java/com/example/fleetproductivity/MainActivity.java
          package com.example.fleetproductivity;
          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import android.view.Gravity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView textView = new TextView(this);
                  textView.setText("Fleet Productivity App is Working!");
                  textView.setTextSize(24);
                  textView.setGravity(Gravity.CENTER);
                  setContentView(textView);
              }
          }
          EOF
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
