name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android Project Structure
      run: |
        mkdir -p app/src/main/java
        
        # إنشاء ملف settings.gradle
        echo "include ':app'" > settings.gradle
        
        # إنشاء ملف build.gradle الرئيسي
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        
        # إنشاء ملف build.gradle الخاص بتطبيق app
        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.fleetproductivity'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.fleetproductivity"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
