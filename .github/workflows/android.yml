name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Base Directories
      run: |
        mkdir -p app/src/main/java/com/example/fleetproductivity
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-mdpi

    - name: Clean Old Duplicate Icons
      run: |
        # حذف أي أيقونات قديمة مكررة في المستودع لمنع تعارض الـ Duplicate resources
        rm -rf app/src/main/res/mipmap-*/*ic_launcher*

    - name: Generate Configuration Files
      run: |
        echo "include ':app'" > settings.gradle
        
        echo -e "buildscript {\n    repositories { google(); mavenCentral() }\n    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }\n}\nallprojects { repositories { google(); mavenCentral() } }" > build.gradle
        
        echo -e "plugins { id 'com.android.application' }\nandroid {\n    namespace 'com.example.fleetproductivity'\n    compileSdk 34\n    defaultConfig {\n        applicationId 'com.example.fleetproductivity'\n        minSdk 24\n        targetSdk 34\n        versionCode 1\n        versionName '1.0'\n    }\n}" > app/build.gradle

    - name: Setup Android Manifest and Code
      run: |
        echo -e '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <application\n        android:allowBackup="true"\n        android:icon="@mipmap/ic_launcher"\n        android:label="Fleet Productivity">\n        <activity\n            android:name="com.example.fleetproductivity.MainActivity"\n            android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.action.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>' > app/src/main/AndroidManifest.xml

        echo -e 'package com.example.fleetproductivity;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.widget.TextView;\nimport android.view.Gravity;\npublic class MainActivity extends Activity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        TextView textView = new TextView(this);\n        textView.setText("Fleet Productivity App is Working!");\n        textView.setTextSize(24);\n        textView.setGravity(Gravity.CENTER);\n        setContentView(textView);\n    }\n}' > app/src/main/java/com/example/fleetproductivity/MainActivity.java

    - name: Generate Clean XML Icon
      run: |
        echo -e '<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android"\n    android:width="108dp"\n    android:height="108dp"\n    android:viewportWidth="108"\n    android:viewportHeight="108">\n    <path\n        android:fillColor="#00BCD4"\n        android:pathData="M0,0h108v108h-108z"/>\n</vector>' > app/src/main/res/mipmap-mdpi/ic_launcher.xml

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
